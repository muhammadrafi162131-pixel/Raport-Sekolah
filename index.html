<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Informasi Guru</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* ================= STYLE HALAMAN LOGIN ================= */
        .login-card {
            background-color: #ffffff;
            padding: 35px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 360px;
        }

        .login-card h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #2c3e50;
            font-size: 24px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-size: 14px;
            font-weight: 600;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 12px;
            color: #888;
        }

        .input-group input {
            width: 100%;
            padding: 12px 12px 12px 40px;
            border: 1px solid #ccd1d9;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            border-color: #4a90e2;
            box-shadow: 0 0 5px rgba(74, 144, 226, 0.3);
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background-color: #4a90e2;
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-login:hover {
            background-color: #357abd;
        }

        .error-message {
            color: #e74c3c;
            font-size: 14px;
            text-align: center;
            margin-top: 15px;
            display: none;
        }

        /* ================= STYLE HALAMAN UTAMA ================= */
        .main-dashboard {
            display: none; /* Disembunyikan saat pertama kali dimuat */
            background-color: #ffffff;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 600px;
            text-align: center;
        }

        .main-dashboard h1 {
            color: #2c3e50;
            margin-bottom: 15px;
        }

        .main-dashboard p {
            color: #666;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .btn-logout {
            padding: 10px 25px;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        .btn-logout:hover {
            background-color: #c0392b;
        }
    </style>
</head>
<body>

    <div id="loginPage" class="login-card">
        <h2>Login Guru</h2>
        <form id="loginForm">
            <div class="input-group">
                <label for="username">Username</label>
                <div class="input-wrapper">
                    <span class="input-icon">👤</span>
                    <input type="text" id="username" required placeholder="Masukkan username">
                </div>
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <span class="input-icon">🔒</span>
                    <input type="password" id="password" required placeholder="Masukkan password">
                </div>
            </div>
            <button type="submit" class="btn-login">Masuk</button>
            <div id="errorMessage" class="error-message">Username atau Password salah!</div>
        </form>
    </div>

    <div id="mainPage" class="main-dashboard">
        <h1>Selamat Datang, Guru!</h1>
        <p>Anda telah berhasil masuk ke Halaman Utama Sistem Informasi Sekolah. Di sini Anda dapat mengelola data nilai, absensi, dan materi pembelajaran.</p>
        <button id="btnLogout" class="btn-logout">Keluar (Logout)</button>
    </div>

    <script>
        const loginPage = document.getElementById('loginPage');
        const mainPage = document.getElementById('mainPage');
        const loginForm = document.getElementById('loginForm');
        const errorMessage = document.getElementById('errorMessage');
        const btnLogout = document.getElementById('btnLogout');

        // Event saat form login disubmit
        loginForm.addEventListener('submit', function(event) {
            event.preventDefault(); // Menahan refresh halaman

            const usernameInput = document.getElementById('username').value;
            const passwordInput = document.getElementById('password').value;

            // Validasi statis
            if (usernameInput === 'guru' && passwordInput === 'guru123') {
                // Sembunyikan halaman login, tampilkan halaman utama
                loginPage.style.display = 'none';
                mainPage.style.display = 'block';
                
                // Reset form dan error message agar bersih saat logout nanti
                loginForm.reset();
                errorMessage.style.display = 'none';
            } else {
                // Tampilkan pesan error jika salah
                errorMessage.style.display = 'block';
            }
        });

        // Event saat tombol logout diklik
        btnLogout.addEventListener('click', function() {
            // Sembunyikan halaman utama, tampilkan kembali halaman login
            mainPage.style.display = 'none';
            loginPage.style.display = 'block';
        });
    </script>

</body>
</html>
