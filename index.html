<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Software Raport Kurikulum Merdeka - Login & Cetak</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #4b6584; margin: 0; padding: 20px; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        
        /* ================= STYLE SISTEM LOGIN ================= */
        .login-container {
            background: #ffffff;
            padding: 35px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 360px;
        }
        .login-container h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 25px;
            font-size: 24px;
            border-bottom: none;
            padding-bottom: 0;
        }
        .login-group {
            margin-bottom: 20px;
        }
        .login-group label {
            display: block;
            margin-bottom: 8px;
            color: #2f3542;
            font-weight: bold;
            font-size: 14px;
        }
        .login-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ced4da;
            border-radius: 4px;
            font-size: 14px;
            outline: none;
        }
        .login-group input:focus {
            border-color: #27ae60;
        }
        .btn-submit-login {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
        }
        .btn-submit-login:hover {
            background-color: #219a52;
        }
        .login-error {
            color: #eb3b5a;
            font-size: 14px;
            text-align: center;
            margin-top: 15px;
            display: none;
            font-weight: bold;
        }

        /* ================= STYLE HALAMAN UTAMA ================= */
        .container { 
            max-width: 1100px; 
            margin: 0 auto; 
            background: #ffffff; 
            padding: 30px; 
            border-radius: 8px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); 
            display: none; /* Disembunyikan di awal sebelum login */
            width: 100%;
        }
        
        .header-app-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px double #2c3e50;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        .header-app-bar h2 {
            margin: 0;
            border-bottom: none;
            padding-bottom: 0;
        }
        .btn-logout {
            background-color: #eb3b5a;
            color: white;
            border: none;
            padding: 8px 16px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
        }
        .btn-logout:hover {
            background-color: #cf2a46;
        }

        h2, h3 { text-align: center; color: #2c3e50; margin: 5px 0; }

        .form-section { background: #f9f9f9; padding: 20px; border: 1px solid #dcdde1; border-radius: 6px; margin-bottom: 20px; }
        .section-title { background: #2c3e50; color: white; padding: 8px 12px; font-weight: bold; border-radius: 4px; margin-top: 0; margin-bottom: 15px; }

        .row { display: flex; gap: 15px; margin-bottom: 10px; }
        .col { flex: 1; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #2f3542; font-size: 13px; }
        input[type="text"], input[type="number"], textarea { width: 100%; padding: 8px; border: 1px solid #ced4da; border-radius: 4px; font-size: 14px; }
        textarea { resize: vertical; height: 80px; font-size: 13px; line-height: 1.4; }

        .auto-textarea { background-color: #f1f2f6; color: #2c3e50; font-style: italic; }

        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th, td { border: 1px solid #2c3e50; padding: 8px; font-size: 13px; vertical-align: top; }
        th { background-color: #f1f2f6; }
        .sub-header { background-color: #dfe4ea; font-weight: bold; }
        .center { text-align: center; }

        .btn-block { background-color: #27ae60; color: white; border: none; padding: 12px; font-size: 16px; font-weight: bold; border-radius: 4px; cursor: pointer; width: 100%; margin-top: 10px; }
        .btn-block:hover { background-color: #219a52; }

        /* Gaya Khusus Area Output Cetak */
        .print-area { display: none; background: white; color: black; padding: 30px; border: 2px solid #000; margin-top: 40px; border-radius: 4px; }
        .report-header table { border: none; margin-bottom: 10px; }
        .report-header td { border: none; padding: 2px; }
        .printable-table td { line-height: 1.5; }

        .print-action-bar { display: flex; justify-content: flex-end; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px dashed #ccc; }
        .btn-print { background-color: #eb3b5a; color: white; border: none; padding: 12px 25px; font-size: 15px; font-weight: bold; border-radius: 4px; cursor: pointer; display: flex; align-items: center; gap: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: 0.2s; }
        .btn-print:hover { background-color: #cf2a46; transform: translateY(-1px); }

        table.table-ttd { border: none; width: 100%; margin-top: 30px; page-break-inside: avoid; }
        table.table-ttd td { border: none; font-size: 14px; padding: 5px; line-height: 1.4; }
        .space-ttd { height: 70px; } 

        /* ================= TATA ATURAN PRINT & ANTI-POTONG ================= */
        @media print {
            body { background: white; padding: 0; margin: 0; display: block; }
            .container { box-shadow: none; padding: 0; max-width: 100%; display: block !important; }
            form, .header-app-bar, .form-section, .print-action-bar, #loginPage { display: none !important; }
            .print-area { display: block !important; border: none; padding: 0; margin-top: 0; }
            .table-ttd, .ketidakhadiran-box { page-break-inside: avoid !important; }
        }
    </style>
</head>
<body>

<div id="loginPage" class="login-container">
    <h2>Login E-Rapor</h2>
    <form id="loginForm">
        <div class="login-group">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="Masukkan username" required>
        </div>
        <div class="login-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Masukkan password" required>
        </div>
        <button type="submit" class="btn-submit-login">Masuk Sistem</button>
        <div id="loginError" class="login-error">Username atau Password salah!
