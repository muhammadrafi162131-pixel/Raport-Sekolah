<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Input Rapor Digital</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* ================= STYLE HALAMAN LOGIN ================= */
        .login-card {
            background-color: #ffffff;
            padding: 35px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 360px;
        }

        .login-card h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #2c3e50;
            font-size: 24px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-size: 14px;
            font-weight: 600;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 12px;
            color: #888;
        }

        .input-group input, .form-raport input, .form-raport select {
            width: 100%;
            padding: 12px 12px 12px 40px;
            border: 1px solid #ccd1d9;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-group input:focus, .form-raport input:focus, .form-raport select:focus {
            border-color: #2ecc71;
            box-shadow: 0 0 5px rgba(46, 204, 113, 0.3);
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background-color: #2ecc71;
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-login:hover {
            background-color: #27ae60;
        }

        .error-message {
            color: #e74c3c;
            font-size: 14px;
            text-align: center;
            margin-top: 15px;
            display: none;
        }

        /* ================= STYLE HALAMAN INPUT RAPOR ================= */
        .raport-container {
            display: none; /* Sembunyikan di awal */
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 900px;
        }

        .header-raport {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #f0f2f5;
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        .header-raport h2 {
            color: #2c3e50;
        }

        .btn-logout {
            padding: 8px 16px;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-logout:hover {
            background-color: #c0392b;
        }

        /* Form Grid */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .form-raport label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #4f5d73;
            margin-bottom: 6px;
        }

        .form-raport input, .form-raport select {
            padding: 10px; /* Reset padding tanpa space ikon */
        }

        .btn-submit-raport {
            padding: 12px 25px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 15px;
        }

        .btn-submit-raport:hover {
            background-color: #2980b9;
        }

        /* Tabel Data Rapor */
        .table-container {
            margin-top: 30px;
            overflow-x: auto;
        }

        .table-container h3 {
            margin-bottom: 15px;
            color: #2c3e50;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 14px;
        }

        th, td {
            padding: 12px;
            border: 1px solid #e0e0e0;
        }

        th {
            background-color: #f8f9fa;
            color: #333;
        }

        tr:nth-child(even) {
            background-color: #fdfdfd;
        }
    </style>
</head>
<body>

    <div id="loginPage" class="login-card">
        <h2>Login E-Rapor</h2>
        <form id="loginForm">
            <div class="input-group">
                <label for="username">Username</label>
                <div class="input-wrapper">
                    <span class="input-icon">👤</span>
                    <input type="text" id="username" required placeholder="Username Anda">
                </div>
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <span class="input-icon">🔒</span>
                    <input type="password" id="password" required placeholder="Password Anda">
                </div>
            </div>
            <button type="submit" class="btn-login">Masuk Sistem</button>
            <div id="errorMessage" class="error-message">Username atau Password salah!</div>
        </form>
    </div>

    <div id="raportPage" class="raport-container">
        <div class="header-raport">
            <h2>Halaman Input Nilai Rapor</h2>
            <button id="btnLogout" class="btn-logout">Keluar</button>
        </div>

        <form id="raportForm" class="form-raport">
            <div class="form-grid">
                <div>
                    <label for="nisn">NISN</label>
                    <input type="text" id="nisn" placeholder="Contoh: 0023456" required>
                </div>
                <div>
                    <label for="namaSiswa">Nama Lengkap Siswa</label>
                    <input type="text" id="namaSiswa" placeholder="Nama Siswa" required>
                </div>
                <div>
                    <label for="kelas">Kelas</label>
                    <select id="kelas" required>
                        <option value="">-- Pilih Kelas --</option>
                        <option value="X-A">Kelas X-A</option>
                        <option value="XI-A">Kelas XI-A</option>
                        <option value="XII-A">Kelas XII-A</option>
                    </select>
                </div>
            </div>

            <div class="form-grid">
                <div>
                    <label for="nilaiMatematika">Nilai Matematika</label>
                    <input type="number" id="nilaiMatematika" min="0" max="100" placeholder="0-100" required>
                </div>
                <div>
                    <label for="nilaiIndo">Nilai Bahasa Indonesia</label>
                    <input type="number" id="nilaiIndo" min="0" max="100" placeholder="0-100" required>
                </div>
                <div>
                    <label for="nilaiInggris">Nilai Bahasa Inggris</label>
                    <input type="number" id="nilaiInggris" min="0" max="100" placeholder="0-100" required>
                </div>
            </div>

            <button type="submit" class="btn-submit-raport">Simpan & Tambah Nilai Rapor</button>
        </form>

        <div class="table-container">
            <h3>Daftar Nilai Rapor Terinput</h3>
            <table>
                <thead>
                    <tr>
                        <th>NISN</th>
                        <th>Nama Siswa</th>
                        <th>Kelas</th>
                        <th>Matematika</th>
                        <th>B. Indonesia</th>
                        <th>B. Inggris</th>
                        <th>Rata-rata</th>
                    </tr>
                </thead>
                <tbody id="raportTableBody">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        const loginPage = document.getElementById('loginPage');
        const raportPage = document.getElementById('raportPage');
        const loginForm = document.getElementById('loginForm');
        const errorMessage = document.getElementById('errorMessage');
        const btnLogout = document.getElementById('btnLogout');
        
        const raportForm = document.getElementById('raportForm');
        const raportTableBody = document.getElementById('raportTableBody');

        // 1. PROSES LOGIN
        loginForm.addEventListener('submit', function(event) {
            event.preventDefault();

            const usernameInput = document.getElementById('username').value;
            const passwordInput = document.getElementById('password').value;

            if (usernameInput === 'guru' && passwordInput === 'guru123') {
                loginPage.style.display = 'none';
                raportPage.style.display = 'block';
                
                loginForm.reset();
                errorMessage.style.display = 'none';
            } else {
                errorMessage.style.display = 'block';
            }
        });

        // 2. PROSES INPUT DATA RAPOR
        raportForm.addEventListener('submit', function(event) {
            event.preventDefault();

            // Ambil data dari form
            const nisn = document.getElementById('nisn').value;
            const namaSiswa = document.getElementById('namaSiswa').value;
            const kelas = document.getElementById('kelas').value;
            const mtk = parseFloat(document.getElementById('nilaiMatematika').value);
            const indo = parseFloat(document.getElementById('nilaiIndo').value);
            const inggris = parseFloat(document.getElementById('nilaiInggris').value);

            // Hitung rata-rata nilai
            const rataRata = ((mtk + indo + inggris) / 3).toFixed(2);

            // Buat baris baru di tabel
            const newRow = document.createElement('tr');
            newRow.innerHTML = `
                <td>${nisn}</td>
                <td>${namaSiswa}</td>
                <td>${kelas}</td>
                <td>${mtk}</td>
                <td>${indo}</td>
                <td>${inggris}</td>
                <strong><td>${rataRata}</td></strong>
            `;

            // Masukkan baris ke dalam tabel body
            raportTableBody.appendChild(newRow);

            // Reset form input setelah sukses ditambahkan
            raportForm.reset();
            alert('Data rapor ' + namaSiswa + ' berhasil disimpan!');
        });

        // 3. PROSES LOGOUT
        btnLogout.addEventListener('click', function() {
            raportPage.style.display = 'none';
            loginPage.style.display = 'block';
        });
    </script>

</body>
</html>
