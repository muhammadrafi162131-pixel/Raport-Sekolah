<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Software Raport Kurikulum Merdeka - SMK Al Kaaffah</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #4b6584; margin: 0; padding: 20px; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        
        /* ================= STYLE INTERFACE LOGIN ================= */
        .login-wrapper {
            background: #ffffff;
            padding: 35px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 380px;
        }
        .login-wrapper h2 { text-align: center; color: #2c3e50; margin-bottom: 25px; font-size: 24px; }
        .login-field { margin-bottom: 20px; }
        .login-field label { display: block; margin-bottom: 8px; color: #2f3542; font-weight: bold; font-size: 14px; }
        .login-field input, .login-field select { width: 100%; padding: 12px; border: 1px solid #ced4da; border-radius: 4px; font-size: 14px; outline: none; }
        .login-field input:focus { border-color: #27ae60; }
        .btn-login { background-color: #27ae60; color: white; border: none; padding: 12px; font-size: 16px; font-weight: bold; border-radius: 4px; cursor: pointer; width: 100%; }
        .btn-login:hover { background-color: #219a52; }
        .error-message { color: #eb3b5a; font-size: 13px; text-align: center; margin-top: 15px; display: none; font-weight: bold; }

        /* ================= STYLE UTAMA DASHBOARD ================= */
        .container { max-width: 1100px; margin: 0 auto; background: #ffffff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); display: none; width: 100%; }
        
        .app-header-bar { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px double #2c3e50; padding-bottom: 10px; margin-bottom: 20px; }
        .app-header-bar h2 { margin: 0; font-size: 20px; color: #2c3e50; }
        .btn-logout { background-color: #eb3b5a; color: white; border: none; padding: 8px 16px; font-size: 13px; font-weight: bold; border-radius: 4px; cursor: pointer; }
        .btn-logout:hover { background-color: #cf2a46; }

        .logo-container { text-align: center; margin-bottom: 15px; }
        .logo-img { width: 100px; height: auto; }

        .form-section { background: #f9f9f9; padding: 20px; border: 1px solid #dcdde1; border-radius: 6px; margin-bottom: 20px; }
        .section-title { background: #2c3e50; color: white; padding: 8px 12px; font-weight: bold; border-radius: 4px; margin-top: 0; margin-bottom: 15px; }

        .row { display: flex; gap: 15px; margin-bottom: 10px; }
        .col { flex: 1; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #2f3542; font-size: 13px; }
        input[type="text"], input[type="number"], select, textarea { width: 100%; padding: 8px; border: 1px solid #ced4da; border-radius: 4px; font-size: 14px; }
        textarea { resize: vertical; height: 75px; font-size: 13px; line-height: 1.4; }
        .auto-textarea { background-color: #f1f2f6; color: #2c3e50; font-style: italic; }

        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th, td { border: 1px solid #2c3e50; padding: 8px; font-size: 13px; vertical-align: top; }
        th { background-color: #f1f2f6; }
        .sub-header { background-color: #dfe4ea; font-weight: bold; }
        .center { text-align: center; }
        .rata-rata-row { background-color: #f1f2f6; font-weight: bold; }

        .btn-block { background-color: #27ae60; color: white; border: none; padding: 12px; font-size: 16px; font-weight: bold; border-radius: 4px; cursor: pointer; width: 100%; margin-top: 10px; }
        .btn-block:hover { background-color: #219a52; }

        /* Area Output Cetak */
        .print-area { display: none; background: white; color: black; padding: 30px; border: 2px solid #000; margin-top: 40px; border-radius: 4px; }
        .report-header table { border: none; margin-bottom: 10px; }
        .report-header td { border: none; padding: 2px; }
        
        .print-action-bar { display: flex; justify-content: flex-end; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px dashed #ccc; }
        .btn-print { background-color: #eb3b5a; color: white; border: none; padding: 12px 25px; font-size: 15px; font-weight: bold; border-radius: 4px; cursor: pointer; display: flex; align-items: center; gap: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        .header-cetak-logo { display: flex; align-items: center; justify-content: center; gap: 20px; border-bottom: 3px double #000; padding-bottom: 10px; margin-bottom: 20px; }
        .header-cetak-logo img { width: 85px; }
        .header-cetak-text { text-align: center; }
        .header-cetak-text h3 { margin: 0; font-size: 18px; }

        table.table-ttd { border: none; width: 100%; margin-top: 40px; page-break-inside: avoid; }
        table.table-ttd td { border: none; font-size: 14px; padding: 5px; text-align: center; vertical-align: top; }
        .space-ttd { height: 75px; }

        /* ================= TATA ATURAN PRINT & PDF ================= */
        @media print {
            body { background: white; padding: 0; margin: 0; display: block; }
            .container { box-shadow: none; padding: 0; max-width: 100%; display: block !important; }
            form, .app-header-bar, .form-section, .print-action-bar, #loginPage { display: none !important; }
            .print-area { display: block !important; border: none; padding: 0; margin-top: 0; }
            .table-ttd, .ketidakhadiran-box { page-break-inside: avoid !important; }
        }
    </style>
</head>
